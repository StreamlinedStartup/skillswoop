version: 2
project_name: skillswoop

before:
  hooks:
    - go mod tidy

builds:
  - id: swoop
    binary: swoop
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: swoop
    name_template: >-
      swoop_{{ .Version }}_{{ .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew tap — pushes Formula/swoop.rb to StreamlinedStartup/homebrew-tap using the
# HOMEBREW_TAP_GITHUB_TOKEN secret (a PAT with Contents:write on that repo).
brews:
  - name: swoop
    directory: Formula
    repository:
      owner: StreamlinedStartup
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/StreamlinedStartup/skillswoop"
    description: "TUI/CLI skill manager for Claude Code + Codex"
    license: "MIT"
    dependencies:
      - name: node
    install: |
      bin.install "swoop"
    test: |
      system "#{bin}/swoop", "--version"

release:
  github:
    owner: StreamlinedStartup
    name: skillswoop
  draft: false
  prerelease: auto
