version: 2
project_name: skillswoop

before:
  hooks:
    - go mod tidy

builds:
  - id: swoop
    binary: swoop
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: swoop
    name_template: >-
      swoop_{{ .Version }}_{{ .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew tap — requires a HOMEBREW_TAP_GITHUB_TOKEN secret with write access to
# the StreamlinedStartup/homebrew-tap repo (the default GITHUB_TOKEN can't push
# cross-repo). Enabled once the secret is set; commented for the first release.
# brews:
